<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 서재 - BookShelf</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">📚 BookShelf</a>
      <button class="hamburger" id="hamburger">&#9776;</button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="../index.html">홈</a></li>
        <li><a href="search.html">책 검색</a></li>
        <li><a href="mylibrary.html" class="active">내 서재</a></li>
        <li><a href="recommend.html">추천 테스트</a></li>
      </ul>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h2 class="section-title">📖 내 서재</h2>

      <div class="library-tabs">
        <button class="tab-btn active" data-tab="stats">📊 독서 통계</button>
        <button class="tab-btn" data-tab="reading">읽는 중</button>
        <button class="tab-btn" data-tab="done">읽었어요</button>
        <button class="tab-btn" data-tab="want">읽고 싶어요</button>
        <button class="tab-btn" data-tab="wishlist">❤️ 찜 목록</button>
        <button class="tab-btn" data-tab="reviews">⭐ 내 리뷰</button>
      </div>

      <div class="tab-content active" id="tab-stats">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">찜한 책</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-done">0</div>
            <div class="stat-label">읽은 책</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-reading">0</div>
            <div class="stat-label">읽는 중</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-reviews">0</div>
            <div class="stat-label">작성한 리뷰</div>
          </div>
        </div>
        <div class="chart-container">
          <h3>📈 독서 현황</h3>
          <div class="bar-chart" id="status-chart"></div>
        </div>
      </div>

      <div class="tab-content" id="tab-reading">
        <div class="book-grid" id="reading-grid"></div>
      </div>

      <div class="tab-content" id="tab-done">
        <div class="book-grid" id="done-grid"></div>
      </div>

      <div class="tab-content" id="tab-want">
        <div class="book-grid" id="want-grid"></div>
      </div>

      <div class="tab-content" id="tab-wishlist">
        <div class="book-grid" id="wish-grid"></div>
      </div>

      <div class="tab-content" id="tab-reviews">
        <div id="my-reviews"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 BookShelf | 도서 데이터: 카카오 도서 API</p>
    </div>
  </footer>

  <script src="../js/common.js"></script>
  <script src="../js/mylibrary.js"></script>
</body>
</html>
