<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>책 검색 - BookShelf</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">📚 BookShelf</a>
      <button class="hamburger" id="hamburger">&#9776;</button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="../index.html">홈</a></li>
        <li><a href="search.html" class="active">책 검색</a></li>
        <li><a href="mylibrary.html">내 서재</a></li>
        <li><a href="recommend.html">추천 테스트</a></li>
      </ul>
    </div>
  </nav>

  <div class="search-header">
    <div class="container">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="책 제목, 저자, 출판사 검색...">
        <button id="search-btn">검색</button>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="filter-bar">
        <label>정렬:</label>
        <select id="sort-select">
          <option value="accuracy">정확도순</option>
          <option value="latest">최신순</option>
        </select>
        <label>표시:</label>
        <select id="size-select">
          <option value="12">12개</option>
          <option value="24">24개</option>
          <option value="48">48개</option>
        </select>
      </div>

      <div id="result-count" class="result-count" style="display:none"></div>
      <div class="book-grid" id="result-grid">
        <div class="no-result">
          <div class="emoji">🔍</div>
          <p>검색어를 입력해보세요!</p>
        </div>
      </div>

      <div style="text-align:center; margin-top: 32px;">
        <button id="load-more" class="btn btn-outline" style="display:none">더 보기</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 BookShelf | 도서 데이터: 카카오 도서 API</p>
    </div>
  </footer>

  <script src="../js/common.js"></script>
  <script src="../js/search.js"></script>
</body>
</html>
