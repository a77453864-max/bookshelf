<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookShelf - 나만의 책 추천</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">📚 BookShelf</a>
      <button class="hamburger" id="hamburger">&#9776;</button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html" class="active">홈</a></li>
        <li><a href="pages/search.html">책 검색</a></li>
        <li><a href="pages/mylibrary.html">내 서재</a></li>
        <li><a href="pages/recommend.html">추천 테스트</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>당신의 다음 책을<br>찾아드립니다</h1>
      <p>책 검색, 독서 기록, 나만의 서재까지<br>BookShelf와 함께하세요</p>
      <div class="hero-search">
        <input type="text" id="hero-search-input" placeholder="읽고 싶은 책을 검색해보세요...">
        <button id="hero-search-btn">검색</button>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title">카테고리별 탐색</h2>
      <div class="category-grid">
        <div class="category-card" data-query="소설">
          <span class="category-icon">📖</span>
          <span>소설</span>
        </div>
        <div class="category-card" data-query="자기계발">
          <span class="category-icon">🚀</span>
          <span>자기계발</span>
        </div>
        <div class="category-card" data-query="경제경영">
          <span class="category-icon">💼</span>
          <span>경제/경영</span>
        </div>
        <div class="category-card" data-query="과학">
          <span class="category-icon">🔬</span>
          <span>과학</span>
        </div>
        <div class="category-card" data-query="역사">
          <span class="category-icon">🏛️</span>
          <span>역사</span>
        </div>
        <div class="category-card" data-query="컴퓨터">
          <span class="category-icon">💻</span>
          <span>컴퓨터</span>
        </div>
        <div class="category-card" data-query="예술">
          <span class="category-icon">🎨</span>
          <span>예술</span>
        </div>
        <div class="category-card" data-query="철학">
          <span class="category-icon">🤔</span>
          <span>철학</span>
        </div>
      </div>
    </div>
  </section>

  <section class="section bg-light">
    <div class="container">
      <h2 class="section-title">🔥 장르별 추천 도서</h2>
      <div class="award-tabs">
        <button class="category-tab active" data-category="novel">📖 소설</button>
        <button class="category-tab" data-category="selfhelp">🚀 자기계발</button>
        <button class="category-tab" data-category="economy">💼 경제/경영</button>
        <button class="category-tab" data-category="science">🔬 과학</button>
      </div>
      <div class="book-grid" id="recommend-grid">
        <div class="loading">추천 도서를 불러오는 중...</div>
      </div>
    </div>
  </section>

  <section class="banner-section">
    <div class="container">
      <div class="banner">
        <div class="banner-text">
          <h3>나에게 맞는 책이 뭘까? 🤔</h3>
          <p>간단한 테스트로 나에게 딱 맞는 장르를 찾아보세요!</p>
        </div>
        <a href="pages/recommend.html" class="banner-btn">테스트 시작하기 →</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 BookShelf | 도서 데이터: 카카오 도서 API</p>
    </div>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
